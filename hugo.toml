baseURL = 'https://jiangge89.github.io/jacksite/'
title = "Jack's Site"
theme = 'hextra'

enableRobotsTXT = true
hasCJKLanguage = true
disablePathToLower = true

[markup]
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
  [markup.goldmark.renderer]
    unsafe = true
  [markup.goldmark.extensions.passthrough]
    enable = false
  [markup.highlight]
    noClasses = false

enableInlineShortcodes = true

[menu]
  [[menu.main]]
    name = 'Search'
    weight = 7
    [menu.main.params]
      type = 'search'

[params]
  description = '个人成长记录'

  [params.theme]
    default = 'system'
    displayToggle = true

  [params.navbar]
    displayTitle = true
    displayLogo = false

  [params.footer]
    enable = true
    displayCopyright = false
    displayPoweredBy = false

  [params.search]
    enable = true
    type = 'flexsearch'
    [params.search.flexsearch]
      index = 'content'
      tokenize = 'forward'

  [params.editURL]
    enable = false

  [params.toc]
    displayTags = false

  [params.page]
    width = 'wide'
